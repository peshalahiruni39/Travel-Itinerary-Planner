<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Destinations - Travel Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="destination.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Travel Planner</a>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="plan.html">Plan Trip</a></li>
                    <li class="nav-item"><a class="nav-link active" href="destinations.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 section-padding">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Top Destinations</h2>
            <hr class="mx-auto" style="width: 60px; height: 3px; background: #1a427a; opacity: 1;">
        </div>

        <div class="row justify-content-center mb-5">
    <div class="col-md-6">
        <div class="input-group shadow-sm">
            <input type="text" id="destSearch" class="form-control" placeholder="Search for any country or city...">
            <button class="btn btn-primary" type="button">🔍</button>
        </div>
    </div>
</div>

<div class="row g-4" id="destGrid"></div>
            
    </main>

    <div class="modal fade" id="destModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalDestName">Paris</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImg" src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=500" class="img-fluid rounded mb-3 shadow-sm" alt="Dest Large">
                    <p id="modalDesc" class="text-muted">The City of Light! Explore iconic landmarks like the Eiffel Tower and Louvre Museum.</p>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3 mt-auto">
        <p class="mb-0">© 2026 Travel Itinerary Planner | Rajarata University of Sri Lanka</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="destination.js"></script>
</body>
</html>
